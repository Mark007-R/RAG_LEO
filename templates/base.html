<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}RAG_LEO{% endblock %}</title>
    <meta name="description" content="{% block description %}AI-powered PDF Question & Answer system{% endblock %}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    {% block extra_css %}{% endblock %}
</head>

<body>
    {% block body %}
    {% endblock %}
    
    {% block scripts %}
    <script src="{{ url_for('static', filename='js/config.js') }}"></script>
    {% endblock %}
    
    {% block extra_scripts %}{% endblock %}
</body>

</html>
